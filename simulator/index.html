<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>3D кидання тіла</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdn.babylonjs.com/materialsLibrary/babylonjs.materials.min.js"></script>
</head>
<body>

<div class="container">

  <div class="controls">

    <h2>Параметри</h2>

    <label>Швидкість v0</label>
    <input type="number" id="v0" value="20">

    <label>Кут θ</label>
    <input type="number" id="theta" value="45">

    <label>Кут φ</label>
    <input type="number" id="phi" value="0">

    <label>Висота y0</label>
    <input type="number" id="y0" value="0">

    <label>g</label>
    <input type="number" id="g" value="9.81" step="0.01">
  </div>

  <canvas id="renderCanvas"></canvas>

</div>

<script src="app.js"></script>
</body>
</html>
